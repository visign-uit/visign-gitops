apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appset-services-dev
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - project: visign
            service: web
            env: dev
            clusterName: aks-visign-dev
            namespace: visign
            chartPath: platform/charts/app-service
            valuesPath: projects/visign/environments/dev/web.values.yaml

          - project: visign
            service: ai
            env: dev
            clusterName: aks-visign-dev
            namespace: visign
            chartPath: platform/charts/app-service
            valuesPath: projects/visign/environments/dev/ai.values.yaml

  template:
    metadata:
      name: "{{project}}-{{service}}-{{env}}"
      labels:
        project: "{{project}}"
        service: "{{service}}"
        env: "{{env}}"

    spec:
      project: "{{project}}"

      sources:
        - repoURL: https://github.com/visign-uit/visign-gitops
          targetRevision: main
          path: "{{chartPath}}"
          helm:
            valueFiles:
              - "$values/{{valuesPath}}"

        - repoURL: https://github.com/visign-uit/visign-gitops
          targetRevision: main
          ref: values

      destination:
        name: "{{clusterName}}"
        namespace: "{{namespace}}"

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
