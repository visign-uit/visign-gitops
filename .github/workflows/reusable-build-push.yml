name: Reusable Build Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context_path:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      torch_compute:
        required: false
        type: string
        default: ""
      migration_enabled:
        required: false
        type: boolean
        default: false
      migration_image_name:
        required: false
        type: string
        default: ""
      migration_dockerfile_path:
        required: false
        type: string
        default: ""
      migration_build_target:
        required: false
        type: string
        default: ""

    outputs:
      image_tag:
        description: Built image tag
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment and ACR
        id: acr
        run: |
          set -euo pipefail

          case "${GITHUB_REF_NAME}" in
            dev)
              echo "environment=dev" >> "$GITHUB_OUTPUT"
              echo "acr_login_server=${{ secrets.NONPROD_ACR_LOGIN_SERVER }}" >> "$GITHUB_OUTPUT"
              echo "acr_username=${{ secrets.NONPROD_ACR_USERNAME }}" >> "$GITHUB_OUTPUT"
              echo "acr_password=${{ secrets.NONPROD_ACR_PASSWORD }}" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "environment=prod" >> "$GITHUB_OUTPUT"
              echo "acr_login_server=${{ secrets.PROD_ACR_LOGIN_SERVER }}" >> "$GITHUB_OUTPUT"
              echo "acr_username=${{ secrets.PROD_ACR_USERNAME }}" >> "$GITHUB_OUTPUT"
              echo "acr_password=${{ secrets.PROD_ACR_PASSWORD }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

      - name: Prepare metadata
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          ENVIRONMENT="${{ steps.acr.outputs.environment }}"
          echo "image_tag=${ENVIRONMENT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: |
          echo "${{ steps.acr.outputs.acr_password }}" | docker login "${{ steps.acr.outputs.acr_login_server }}" \
            --username "${{ steps.acr.outputs.acr_username }}" \
            --password-stdin

      - name: Build and push main image
        run: |
          set -euo pipefail

          BUILD_ARGS=""

          if [ "${{ inputs.image_name }}" = "visign-web" ]; then
            CLERK_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"

            if [ -z "$CLERK_KEY" ]; then
              echo "Missing NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
              exit 1
            fi

            BUILD_ARGS="$BUILD_ARGS --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$CLERK_KEY"
          fi

          if [ -n "${{ inputs.torch_compute }}" ]; then
            BUILD_ARGS="$BUILD_ARGS --build-arg TORCH_COMPUTE=${{ inputs.torch_compute }}"
          fi

          IMAGE="${{ steps.acr.outputs.acr_login_server }}/${{ inputs.image_name }}:${{ steps.meta.outputs.image_tag }}"

          docker build \
            $BUILD_ARGS \
            -f "${{ inputs.dockerfile_path }}" \
            -t "$IMAGE" \
            "${{ inputs.context_path }}"

          docker push "$IMAGE"

      - name: Build and push migration image
        if: inputs.migration_enabled
        run: |
          set -euo pipefail

          TARGET_ARG=""
          if [ -n "${{ inputs.migration_build_target }}" ]; then
            TARGET_ARG="--target ${{ inputs.migration_build_target }}"
          fi

          IMAGE="${{ steps.acr.outputs.acr_login_server }}/${{ inputs.migration_image_name }}:${{ steps.meta.outputs.image_tag }}"

          docker build \
            ${TARGET_ARG} \
            -f "${{ inputs.migration_dockerfile_path }}" \
            -t "$IMAGE" \
            "${{ inputs.context_path }}"

          docker push "$IMAGE"
