project:
  name: visign
  environment: prod

service:
  name: visign-ai
  component: ai
  type: fastapi
  port: 8000
  containerPort: 8000

image:
  repository: visignprodacrqjczbu.azurecr.io/visign-ai
  tag: prod-placeholder
  pullPolicy: IfNotPresent

replicaCount: 2

probes:
  enabled: true
  path: /health

ingress:
  enabled: false

keyVault:
  enabled: false

migration:
  enabled: false

topologySpread:
  enabled: true
